<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aparfolio</title>
    <link rel="icon" href ="./images/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon-16x16.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container-frame">
            <div class="container">

                <!-- ============ -->
                <!-- Top Controls -->
                <!-- ============ -->
                <div class="top-controls-wrap">
                    <div class="top-controls">
                        <div class="top-control-item">
                            <a
                                href="./resume.pdf"
                                download="Aparnaa_Senthilnathan_Resume.pdf"
                                class="button"
                                aria-label="Download Resume"
                                title="Download Resume"
                            ></a>
                            <span class="top-label">Resume</span>
                        </div>
                        <div class="top-control-item">
                            <a
                                href="https://github.com/AparCode"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="button"
                                aria-label="GitHub"
                            ></a>
                            <span class="top-label">GitHub</span>
                        </div>
                        <div class="top-control-item">
                            <a
                                href="https://www.linkedin.com/in/aparnaain/"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="button"
                                aria-label="LinkedIn"
                            ></a>
                            <span class="top-label">LinkedIn</span>
                        </div>
                        <div class="top-control-item">
                            <a
                                href="https://mail.google.com/mail/?view=cm&fs=1&to=apar2003@gmail.com"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="button"
                                aria-label="Contact"
                            ></a>
                            <span class="top-label">Contact</span>
                        </div>
                    </div>
                </div>
                <!-- ============= -->
                <!-- Clear Control -->
                <!-- ============= -->
                <div class="clear-control">
                    <div class="top-control-item">
                        <button class="button" aria-label="Clear"></button>
                        <span class="top-label">Clear</span>
                    </div>
                </div>
                <!-- ============= -->
                <!-- Side Controls -->
                <!-- ============= -->
                <div class="side-controls">
                    <div class="side-control-row">
                        <button class="button" aria-label="About"></button>
                        <span class="side-label">About</span>
                    </div>
                    <div class="side-control-row">
                        <button class="button" aria-label="Experience"></button>
                        <span class="side-label">Experience</span>
                    </div>
                    <div class="side-control-row">
                        <button class="button" aria-label="Projects"></button>
                        <span class="side-label">Projects</span>
                    </div>
                    <div class="side-control-row">
                        <button class="button" aria-label="Music"></button>
                        <span class="side-label">Music</span>
                    </div>
                </div>
                <!-- ============ -->
                <!-- LED Pad Grid -->
                <!-- ============ -->
                <div class="led-pads">
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- ========== -->
    <!-- Pad Dialog  -->
    <!-- ========== -->
    <dialog id="padDialog" aria-labelledby="padDialogTitle">
        <h2 id="padDialogTitle">Pad</h2>
        <p id="padDialogMessage"></p>
        <div class="dialog-actions">
            <button id="padDialogClose" type="button">Close</button>
            <button id="padDialogOpen" type="button">Open</button>
        </div>
    </dialog>
    <!-- ======= -->
    <!-- Scripts -->
    <!-- ======= -->
    <script src="./app.js" defer></script>
</body>
</html>
