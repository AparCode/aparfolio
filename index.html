<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aparfolio</title>
    <link rel="icon" href ="/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container-frame">
            <div class="container">
                <div class="top-controls-wrap">
                    <div class="top-controls">
                        <div class="top-control-item">
                            <button class="button" aria-label="Resume"></button>
                            <span class="top-label">Resume</span>
                        </div>
                        <div class="top-control-item">
                            <button class="button" aria-label="GitHub"></button>
                            <span class="top-label">GitHub</span>
                        </div>
                        <div class="top-control-item">
                            <button class="button" aria-label="LinkedIn"></button>
                            <span class="top-label">LinkedIn</span>
                        </div>
                        <div class="top-control-item">
                            <button class="button" aria-label="Contact"></button>
                            <span class="top-label">Contact</span>
                        </div>
                    </div>
                </div>
                <div class="clear-control">
                    <div class="top-control-item">
                        <button class="button" aria-label="Clear"></button>
                        <span class="top-label">Clear</span>
                    </div>
                </div>
                <div class="side-controls">
                    <div class="side-control-row">
                        <button class="button" aria-label="About"></button>
                        <span class="side-label">About</span>
                    </div>
                    <div class="side-control-row">
                        <button class="button" aria-label="Experience"></button>
                        <span class="side-label">Experience</span>
                    </div>
                    <div class="side-control-row">
                        <button class="button" aria-label="Projects"></button>
                        <span class="side-label">Projects</span>
                    </div>
                    <div class="side-control-row">
                        <button class="button" aria-label="Music"></button>
                        <span class="side-label">Music</span>
                    </div>
                </div>
                <div class="led-pads">
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                    <div class="pad">
                    </div>
                </div>
            </div>
        </div>
    </main>

</html>
